<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METRO DASH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700&display=swap');

  :root {
    --neon-yellow: #FFE500;
    --neon-cyan: #00F5FF;
    --neon-pink: #FF2D78;
    --dark-bg: #0a0a0f;
    --track-color: #1a1a2e;
    --rail-color: #C0C0C0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Barlow Condensed', sans-serif;
    color: white;
  }

  #gameWrapper {
    position: relative;
    width: 480px;
    height: 640px;
  }

  canvas {
    display: block;
    border: 2px solid var(--neon-cyan);
    box-shadow: 0 0 30px rgba(0, 245, 255, 0.3), inset 0 0 30px rgba(0,0,0,0.5);
    border-radius: 4px;
  }

  #ui {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  #score-display {
    position: absolute;
    top: 18px; left: 20px;
    font-family: 'Bebas Neue', cursive;
    font-size: 42px;
    color: var(--neon-yellow);
    text-shadow: 0 0 10px rgba(255,229,0,0.8);
    letter-spacing: 2px;
  }

  #score-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    position: absolute;
    top: 14px; left: 21px;
  }

  #coins-display {
    position: absolute;
    top: 18px; right: 20px;
    font-family: 'Bebas Neue', cursive;
    font-size: 32px;
    color: var(--neon-yellow);
    text-shadow: 0 0 10px rgba(255,229,0,0.6);
  }

  #coin-icon {
    display: inline-block;
    width: 18px; height: 18px;
    background: var(--neon-yellow);
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    box-shadow: 0 0 8px rgba(255,229,0,0.8);
  }

  #overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10, 10, 15, 0.88);
    pointer-events: all;
    backdrop-filter: blur(4px);
    transition: opacity 0.3s;
  }

  #overlay.hidden { display: none; }

  #overlay h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: 72px;
    letter-spacing: 6px;
    color: var(--neon-cyan);
    text-shadow: 0 0 20px rgba(0,245,255,0.8), 0 0 60px rgba(0,245,255,0.3);
    line-height: 1;
    margin-bottom: 4px;
  }

  #overlay .tagline {
    font-size: 13px;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  #overlay .final-score {
    font-family: 'Bebas Neue', cursive;
    font-size: 52px;
    color: var(--neon-yellow);
    text-shadow: 0 0 10px rgba(255,229,0,0.6);
    margin-bottom: 8px;
  }

  #overlay .score-label {
    font-size: 12px;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  #startBtn {
    background: transparent;
    border: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-family: 'Bebas Neue', cursive;
    font-size: 24px;
    letter-spacing: 6px;
    padding: 14px 48px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    box-shadow: 0 0 15px rgba(0,245,255,0.2);
  }

  #startBtn:hover {
    background: var(--neon-cyan);
    color: var(--dark-bg);
    box-shadow: 0 0 30px rgba(0,245,255,0.5);
    transform: scale(1.04);
  }

  #controls-hint {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.25);
    white-space: nowrap;
  }

  #title-bar {
    width: 480px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 4px;
  }

  #title-bar span {
    font-family: 'Bebas Neue', cursive;
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--neon-pink);
    text-shadow: 0 0 10px rgba(255,45,120,0.5);
  }

  #hi-score-bar {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }

  #hi-score-bar b {
    color: var(--neon-yellow);
    font-family: 'Bebas Neue', cursive;
    font-size: 16px;
  }
</style>
</head>
<body>

<div id="title-bar">
  <span>METRO DASH</span>
  <div id="hi-score-bar">BEST &nbsp;<b id="hiScoreVal">0</b></div>
</div>

<div id="gameWrapper">
  <canvas id="gameCanvas" width="480" height="640"></canvas>

  <div id="ui">
    <div id="score-label">SCORE</div>
    <div id="score-display">0</div>
    <div id="coins-display"><span id="coin-icon"></span><span id="coinCount">0</span></div>
    <div id="controls-hint">← → MOVE &nbsp;|&nbsp; ↑ JUMP &nbsp;|&nbsp; ↓ ROLL</div>
  </div>

  <div id="overlay">
    <h1>METRO<br>DASH</h1>
    <div class="tagline">Endless City Runner</div>
    <div class="final-score" id="finalScore" style="display:none">0</div>
    <div class="score-label" id="finalScoreLabel" style="display:none">FINAL SCORE</div>
    <button id="startBtn">START RUNNING</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ---- GAME STATE ----
let state = 'idle'; // idle, playing, dead
let score = 0, coins = 0, hiScore = 0;
let speed = 5, frameCount = 0;
let bgOffset = 0;

// ---- LANES ----
const LANES = 3;
const laneX = [W/2 - 120, W/2, W/2 + 120];
const LANE_Y_BASE = H - 120;

// ---- PLAYER ----
const player = {
  lane: 1,
  targetLane: 1,
  x: laneX[1],
  y: LANE_Y_BASE,
  w: 32, h: 52,
  vy: 0,
  grounded: true,
  jumping: false,
  rolling: false,
  rollTimer: 0,
  animFrame: 0,
  animTimer: 0,
  dead: false,
  flash: 0,
};

// ---- OBSTACLES ----
let obstacles = [];
let coinItems = [];
let particles = [];
let bgBuildings = [];
let bgTracks = [];

// ---- INPUT ----
const keys = {};
let touchStartX = 0, touchStartY = 0;

document.addEventListener('keydown', e => {
  if (state !== 'playing') return;
  if (e.key === 'ArrowLeft' || e.key === 'a') moveLane(-1);
  if (e.key === 'ArrowRight' || e.key === 'd') moveLane(1);
  if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') && !e.repeat) jump();
  if ((e.key === 'ArrowDown' || e.key === 's') && !e.repeat) roll();
  e.preventDefault();
});

canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (state !== 'playing') return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 20) moveLane(1);
    else if (dx < -20) moveLane(-1);
  } else {
    if (dy < -20) jump();
    else if (dy > 20) roll();
  }
  e.preventDefault();
}, { passive: false });

document.getElementById('startBtn').addEventListener('click', startGame);

function moveLane(dir) {
  const next = player.targetLane + dir;
  if (next >= 0 && next < LANES) {
    player.targetLane = next;
    spawnLaneParticles();
  }
}

function jump() {
  if (player.grounded && !player.rolling) {
    player.vy = -17;
    player.grounded = false;
    player.jumping = true;
  }
}

function roll() {
  if (player.grounded && !player.rolling) {
    player.rolling = true;
    player.rollTimer = 50;
  }
}

// ---- INIT ----
function startGame() {
  state = 'playing';
  score = 0; coins = 0;
  speed = 5; frameCount = 0;
  player.lane = 1; player.targetLane = 1;
  player.x = laneX[1]; player.y = LANE_Y_BASE;
  player.vy = 0; player.grounded = true;
  player.jumping = false; player.rolling = false;
  player.dead = false; player.flash = 0;
  obstacles = []; coinItems = []; particles = [];
  bgBuildings = initBuildings();
  bgTracks = [];
  document.getElementById('overlay').classList.add('hidden');
  updateUI();
  loop();
}

function initBuildings() {
  const blds = [];
  for (let i = 0; i < 12; i++) {
    blds.push({
      x: Math.random() * W,
      y: Math.random() * 80 + 40,
      w: Math.random() * 40 + 20,
      h: Math.random() * 120 + 60,
      color: `hsl(${200 + Math.random()*60}, 30%, ${8 + Math.random()*8}%)`,
      speed: 0.5 + Math.random() * 0.5,
      windows: Math.floor(Math.random() * 5) + 2
    });
  }
  return blds;
}

// ---- SPAWN ----
function spawnObstacle() {
  const lane = Math.floor(Math.random() * LANES);
  const types = ['train', 'barrier', 'pole'];
  const type = types[Math.floor(Math.random() * types.length)];
  let w = 36, h = 52;
  if (type === 'train') { w = 52; h = 68; }
  if (type === 'barrier') { w = 44; h = 28; }
  obstacles.push({ lane, x: laneX[lane], y: -80, w, h, type, passed: false });
}

function spawnCoin() {
  const lane = Math.floor(Math.random() * LANES);
  const count = Math.floor(Math.random() * 3) + 1;
  for (let i = 0; i < count; i++) {
    coinItems.push({ lane, x: laneX[lane], y: -80 - i * 44, r: 10, collected: false });
  }
}

function spawnLaneParticles() {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: player.x + (Math.random()-0.5)*20,
      y: player.y + (Math.random()-0.5)*20,
      vx: (Math.random()-0.5)*4,
      vy: (Math.random()-0.5)*4 - 2,
      life: 1, decay: 0.06,
      r: Math.random()*4+2,
      color: `hsl(${185+Math.random()*30}, 100%, 70%)`
    });
  }
}

function spawnDeathParticles() {
  for (let i = 0; i < 22; i++) {
    const angle = (i / 22) * Math.PI * 2;
    const spd = 2 + Math.random() * 5;
    particles.push({
      x: player.x, y: player.y,
      vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 2,
      life: 1, decay: 0.025,
      r: Math.random()*6+2,
      color: `hsl(${Math.random()*30+340}, 100%, 65%)`
    });
  }
}

// ---- UPDATE ----
function update() {
  frameCount++;
  speed = 5 + Math.floor(frameCount / 300) * 0.5;
  score += Math.round(speed * 0.1);

  // Buildings bg scroll
  bgBuildings.forEach(b => {
    b.x -= b.speed;
    if (b.x + b.w < 0) {
      b.x = W + 10;
      b.y = Math.random() * 80 + 40;
      b.h = Math.random() * 120 + 60;
    }
  });

  // Background track lines
  bgOffset += speed;
  if (bgOffset > 40) bgOffset -= 40;

  // Move player x toward target
  const tx = laneX[player.targetLane];
  player.x += (tx - player.x) * 0.25;

  // Gravity / jump
  if (!player.grounded) {
    player.vy += 0.85;
    player.y += player.vy;
    if (player.y >= LANE_Y_BASE) {
      player.y = LANE_Y_BASE;
      player.vy = 0;
      player.grounded = true;
      player.jumping = false;
    }
  }

  // Roll timer
  if (player.rolling) {
    player.rollTimer--;
    if (player.rollTimer <= 0) player.rolling = false;
  }

  // Flash cooldown
  if (player.flash > 0) player.flash--;

  // Run animation
  player.animTimer++;
  if (player.animTimer > 8) { player.animFrame = (player.animFrame + 1) % 4; player.animTimer = 0; }

  // Spawn
  if (frameCount % Math.max(60, 100 - Math.floor(frameCount/300)*5) === 0) spawnObstacle();
  if (frameCount % 90 === 0) spawnCoin();

  // Move & check obstacles
  obstacles.forEach(o => {
    o.y += speed;
    if (!o.passed && o.y > H + 100) { o.passed = true; }
    // Collision
    if (!o.passed && !player.dead) {
      const ph = player.rolling ? 20 : player.h;
      const py = player.rolling ? player.y + player.h - 20 : player.y;
      const playerLeft = player.x - player.w/2 + 6;
      const playerRight = player.x + player.w/2 - 6;
      const playerTop = py - ph;
      const playerBot = py;

      const oLeft = o.x - o.w/2;
      const oRight = o.x + o.w/2;
      const oTop = o.y - o.h;
      const oBot = o.y;

      if (playerRight > oLeft && playerLeft < oRight &&
          playerBot > oTop && playerTop < oBot) {
        // Hit!
        spawnDeathParticles();
        player.dead = true;
        setTimeout(gameOver, 900);
      }
    }
  });
  obstacles = obstacles.filter(o => !o.passed && o.y < H + 120);

  // Move & check coins
  coinItems.forEach(c => {
    c.y += speed;
    if (!c.collected) {
      const dist = Math.hypot(player.x - c.x, (player.y - 20) - c.y);
      if (dist < 26) {
        c.collected = true;
        coins++;
        for (let i = 0; i < 6; i++) {
          particles.push({
            x: c.x, y: c.y,
            vx: (Math.random()-0.5)*5,
            vy: (Math.random()-0.5)*5 - 2,
            life: 1, decay: 0.1,
            r: Math.random()*4+2,
            color: '#FFE500'
          });
        }
      }
    }
  });
  coinItems = coinItems.filter(c => !c.collected && c.y < H + 60);

  // Particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);

  updateUI();
}

// ---- DRAW ----
function draw() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  sky.addColorStop(0, '#05050f');
  sky.addColorStop(1, '#0d0d25');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  for (let i = 0; i < 60; i++) {
    const sx = ((i * 137 + frameCount * 0.05) % W);
    const sy = ((i * 97) % (H * 0.45));
    ctx.fillRect(sx, sy, 1.2, 1.2);
  }

  // Buildings silhouette
  bgBuildings.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, H * 0.45 - b.h, b.w, b.h);
    // Windows
    ctx.fillStyle = 'rgba(255, 235, 100, 0.15)';
    const cols = 2, rows = b.windows;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (Math.sin(b.x + r * 7 + c * 13 + frameCount * 0.001) > 0.2) {
          ctx.fillRect(b.x + 4 + c * (b.w/2 - 3), H * 0.45 - b.h + 8 + r * 22, b.w/2 - 7, 12);
        }
      }
    }
  });

  // Ground platform
  const groundY = H - 100;
  const ground = ctx.createLinearGradient(0, groundY, 0, H);
  ground.addColorStop(0, '#141428');
  ground.addColorStop(1, '#0a0a14');
  ctx.fillStyle = ground;
  ctx.fillRect(0, groundY, W, H - groundY);

  // Track lanes
  const trackColors = ['#1e1e3a', '#22223f', '#1e1e3a'];
  laneX.forEach((lx, i) => {
    ctx.fillStyle = trackColors[i];
    ctx.fillRect(lx - 55, groundY, 110, H - groundY);
  });

  // Rail lines with perspective
  ctx.strokeStyle = 'rgba(192,192,192,0.5)';
  ctx.lineWidth = 2;
  laneX.forEach(lx => {
    [-18, 18].forEach(offset => {
      ctx.beginPath();
      ctx.moveTo(lx + offset, groundY);
      ctx.lineTo(lx + offset, H);
      ctx.stroke();
    });
  });

  // Horizontal rail ties (moving)
  ctx.strokeStyle = 'rgba(100,80,60,0.35)';
  ctx.lineWidth = 6;
  for (let y = (bgOffset % 40); y < H - groundY; y += 40) {
    laneX.forEach(lx => {
      ctx.beginPath();
      ctx.moveTo(lx - 50, groundY + y);
      ctx.lineTo(lx + 50, groundY + y);
      ctx.stroke();
    });
  }

  // Lane dividers (faint)
  ctx.strokeStyle = 'rgba(0, 245, 255, 0.06)';
  ctx.lineWidth = 1;
  [W/2 - 60, W/2 + 60].forEach(lx => {
    ctx.beginPath(); ctx.moveTo(lx, groundY); ctx.lineTo(lx, H); ctx.stroke();
  });

  // Neon glow on ground edge
  ctx.strokeStyle = 'rgba(0, 245, 255, 0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(W, groundY); ctx.stroke();

  // Draw coins
  coinItems.forEach(c => {
    if (c.collected) return;
    ctx.save();
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#FFE500';
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
    ctx.fillStyle = '#FFE500';
    ctx.fill();
    ctx.strokeStyle = '#FFA500';
    ctx.lineWidth = 2;
    ctx.stroke();
    // $ sign
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#8B6000';
    ctx.font = 'bold 10px Bebas Neue, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', c.x, c.y);
    ctx.restore();
  });

  // Draw obstacles
  obstacles.forEach(o => drawObstacle(o));

  // Draw particles
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 8;
    ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // Draw player
  if (!player.dead || (Math.floor(frameCount / 3) % 2 === 0)) {
    drawPlayer();
  }

  // Speed lines effect at high speed
  if (speed > 8) {
    const alpha = Math.min((speed - 8) / 6, 0.3);
    ctx.save();
    ctx.globalAlpha = alpha;
    for (let i = 0; i < 8; i++) {
      const lx = Math.random() * W;
      ctx.strokeStyle = 'rgba(0, 245, 255, 0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(lx, 0); ctx.lineTo(lx, H);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawPlayer() {
  const x = player.x, y = player.y;
  const rolling = player.rolling;
  const h = rolling ? 24 : player.h;
  const w = player.w;

  ctx.save();
  if (player.flash > 0 && player.flash % 4 < 2) {
    ctx.globalAlpha = 0.5;
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(x, y + 4, 20, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  if (rolling) {
    // Rolling ball
    ctx.fillStyle = '#FF2D78';
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#FF2D78';
    ctx.beginPath();
    ctx.arc(x, y - 12, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y - 12, 12, 0.5, 2.5);
    ctx.stroke();
  } else {
    // Body
    ctx.fillStyle = '#FF2D78';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#FF2D78';
    // Torso
    ctx.fillRect(x - 12, y - h + 20, 24, 26);
    ctx.shadowBlur = 0;

    // Jacket detail
    ctx.fillStyle = '#C0003D';
    ctx.fillRect(x - 12, y - h + 20, 11, 26);

    // Head
    ctx.fillStyle = '#FDDBB4';
    ctx.beginPath();
    ctx.arc(x, y - h + 12, 12, 0, Math.PI * 2);
    ctx.fill();

    // Hair
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x - 12, y - h, 24, 10);
    ctx.beginPath();
    ctx.arc(x, y - h + 8, 12, Math.PI, 0);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(x - 6, y - h + 8, 4, 4);
    ctx.fillRect(x + 2, y - h + 8, 4, 4);
    ctx.fillStyle = '#111';
    ctx.fillRect(x - 5, y - h + 9, 2, 3);
    ctx.fillRect(x + 3, y - h + 9, 2, 3);

    // Legs (animated)
    ctx.fillStyle = '#2255CC';
    const legOffset = Math.sin(player.animFrame * Math.PI / 2) * 6;
    ctx.fillRect(x - 11, y - 24, 10, 20 + legOffset);
    ctx.fillRect(x + 1, y - 24, 10, 20 - legOffset);

    // Shoes
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(x - 13, y - 4 + legOffset, 12, 8);
    ctx.fillRect(x + 1, y - 4 - legOffset, 12, 8);

    // Jumping pose: arms up
    if (player.jumping) {
      ctx.fillStyle = '#FF2D78';
      ctx.fillRect(x - 22, y - h + 20, 10, 6);
      ctx.fillRect(x + 12, y - h + 20, 10, 6);
    } else {
      // Arms swinging
      const armSwing = Math.sin(player.animFrame * Math.PI / 2) * 5;
      ctx.fillRect(x - 20, y - h + 24 + armSwing, 9, 14);
      ctx.fillRect(x + 11, y - h + 24 - armSwing, 9, 14);
    }
  }
  ctx.restore();
}

function drawObstacle(o) {
  const x = o.x, y = o.y;

  ctx.save();
  ctx.shadowBlur = 8;

  if (o.type === 'train') {
    ctx.shadowColor = '#FF5500';
    // Body
    ctx.fillStyle = '#CC2200';
    ctx.fillRect(x - 26, y - 68, 52, 60);
    // Top
    ctx.fillStyle = '#FF4400';
    ctx.fillRect(x - 22, y - 76, 44, 14);
    // Windows
    ctx.fillStyle = '#88CCFF';
    ctx.fillRect(x - 18, y - 62, 14, 14);
    ctx.fillRect(x + 4, y - 62, 14, 14);
    // Stripes
    ctx.fillStyle = '#FFAA00';
    ctx.fillRect(x - 26, y - 44, 52, 5);
    // Bottom
    ctx.fillStyle = '#881100';
    ctx.fillRect(x - 26, y - 14, 52, 14);
    // Wheels
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(x - 16, y, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 16, y, 8, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x - 16, y, 5, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(x + 16, y, 5, 0, Math.PI*2); ctx.stroke();

  } else if (o.type === 'barrier') {
    ctx.shadowColor = '#FFAA00';
    // Post
    ctx.fillStyle = '#FF8800';
    ctx.fillRect(x - 22, y - 26, 6, 26);
    ctx.fillRect(x + 16, y - 26, 6, 26);
    // Bar (striped)
    for (let i = 0; i < 5; i++) {
      ctx.fillStyle = i % 2 === 0 ? '#FFCC00' : '#FF4400';
      ctx.fillRect(x - 22 + i * 9, y - 24, 9, 10);
    }
    // Warning lights
    ctx.fillStyle = '#FF0000';
    ctx.shadowColor = '#FF0000';
    ctx.shadowBlur = 15;
    ctx.beginPath(); ctx.arc(x - 19, y - 30, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 19, y - 30, 5, 0, Math.PI*2); ctx.fill();

  } else if (o.type === 'pole') {
    ctx.shadowColor = '#00FFAA';
    ctx.fillStyle = '#00BB88';
    ctx.fillRect(x - 8, y - 52, 16, 52);
    ctx.fillStyle = '#00FFAA';
    ctx.fillRect(x - 8, y - 52, 16, 6);
    ctx.fillRect(x - 20, y - 52, 40, 8);
    // Wires
    ctx.strokeStyle = 'rgba(0,200,150,0.4)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x - 60, y - 50); ctx.lineTo(x + 60, y - 50);
    ctx.stroke();
  }
  ctx.restore();
}

// ---- UI UPDATE ----
function updateUI() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('coinCount').textContent = coins;
}

// ---- GAME OVER ----
function gameOver() {
  state = 'dead';
  if (score > hiScore) {
    hiScore = score;
    document.getElementById('hiScoreVal').textContent = hiScore;
  }
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  overlay.querySelector('h1').style.display = 'none';
  overlay.querySelector('.tagline').style.display = 'none';
  document.getElementById('finalScore').style.display = 'block';
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalScoreLabel').style.display = 'block';
  document.getElementById('startBtn').textContent = 'RUN AGAIN';
}

// Reset overlay for restart
document.getElementById('startBtn').addEventListener('click', () => {
  const overlay = document.getElementById('overlay');
  overlay.querySelector('h1').style.display = '';
  overlay.querySelector('.tagline').style.display = '';
  document.getElementById('finalScore').style.display = 'none';
  document.getElementById('finalScoreLabel').style.display = 'none';
  document.getElementById('startBtn').textContent = 'START RUNNING';
});

// ---- GAME LOOP ----
let lastTime = 0;
let animId;
function loop(time = 0) {
  if (state !== 'playing') return;
  animId = requestAnimationFrame(loop);
  update();
  draw();
}

// Init draw on load
draw();
</script>
